robot:
  robot_name: "Panthera-HT"
  Serial_Type: "/dev/ttyACM"
  Seial_baudrate: 4000000
  motor_timeout_ms: 0  # Motor timeout in milliseconds, range [0, 32760]. If no new control command is received within this time, the motor enters damping mode. Set to 0 to disable the timeout.
  canport_error_output_flag: false  # Whether to enable the CAN port error output flag. When enabled, the system prints error messages on CAN port faults to help with debugging.
  board_special_flag: false  # Whether to enable the special board flag. When enabled, the system operates according to a specific board configuration, useful for certain custom hardware setups.
  exit_motor_brake_flag: true  # Whether to enable the exit-motor-brake flag. When enabled, the motors automatically release their brakes on system exit, allowing free movement.
